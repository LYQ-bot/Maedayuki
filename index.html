<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>喵喵语记 - 你的温暖陪伴猫</title>
<style>
    :root {
        --light-blue: #D6EAF8;
        --light-blue-hover: #AED6F1;
        --light-yellow: #FCF3CF;
        --light-green: #D5F5E3;
        --light-red: #FADBD8;
        --black: #2C3E50;
        --white: #FFFFFF;
        --bg-color: #F8F9FA;
        --flame-on: #FF5733;
        --flame-off: #BDC3C7;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Nunito', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif, 'Microsoft YaHei'; }
    body { background-color: var(--bg-color); color: var(--black); min-height: 100vh; overflow-x: hidden; }
    
    /* Utility & Layout */
    .container { max-width: 600px; margin: 0 auto; padding: 20px; position: relative; }
    .hidden { display: none !important; }
    .btn { background: var(--light-yellow); border: 2px solid var(--black); border-radius: 12px; padding: 10px 20px; font-size: 16px; font-weight: bold; cursor: pointer; transition: transform 0.1s, box-shadow 0.1s; box-shadow: 2px 2px 0 var(--black); color: var(--black); display: inline-flex; align-items: center; justify-content: center; gap: 8px; }
    .btn:active { transform: translate(2px, 2px); box-shadow: 0 0 0 var(--black); }
    .btn-blue { background: var(--light-blue); }
    .btn-green { background: var(--light-green); }
    .btn-small { padding: 4px 8px; font-size: 12px; border-radius: 8px; }
    
    /* Quick Play Button */
    .btn-quick-play {
        background: var(--light-yellow);
        border: 2px solid var(--black);
        border-radius: 20px;
        padding: 6px 12px;
        font-size: 14px;
        font-weight: bold;
        cursor: pointer;
        box-shadow: 2px 2px 0 var(--black);
        display: inline-flex;
        align-items: center;
        gap: 5px;
        margin-left: 15px;
        transition: transform 0.1s, box-shadow 0.1s;
        color: var(--black);
        flex-shrink: 0;
    }
    .btn-quick-play:active { transform: translate(2px, 2px); box-shadow: 0 0 0 var(--black); }

    /* Header & Fire Streak */
    header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; background: var(--white); padding: 15px; border-radius: 16px; border: 2px solid var(--black); box-shadow: 4px 4px 0 var(--black); }
    .title-area h1 { font-size: 20px; display: flex; align-items: center; gap: 10px; }
    .streak-area { display: flex; align-items: center; gap: 5px; font-weight: bold; font-size: 18px; white-space: nowrap; }
    .flame-icon { width: 24px; height: 24px; transition: fill 0.3s; }
    .flame-active { fill: var(--flame-on); }
    .flame-inactive { fill: var(--flame-off); }

    /* Views */
    .view-section { background: var(--white); padding: 20px; border-radius: 16px; border: 2px solid var(--black); box-shadow: 4px 4px 0 var(--black); margin-bottom: 20px; animation: popIn 0.3s ease-out; position: relative;}
    @keyframes popIn { 0% { opacity: 0; transform: scale(0.95); } 100% { opacity: 1; transform: scale(1); } }

    /* Lists */
    .collection-list { list-style: none; display: flex; flex-direction: column; gap: 10px; margin-top: 15px; }
    .collection-item { background: var(--light-blue); border: 2px solid var(--black); border-radius: 12px; padding: 15px; display: flex; justify-content: space-between; align-items: center; transition: transform 0.2s; }
    .collection-item:hover { transform: translateX(3px); }
    .collection-info { display: flex; align-items: center; gap: 10px; font-weight: bold; font-size: 16px; cursor: pointer; }
    .collection-right { display: flex; align-items: center; }
    
    /* Sentence Library Items */
    .sentence-item {
        background: var(--bg-color); border: 2px solid var(--black); border-radius: 10px; padding: 12px; margin-top: 10px;
        display: flex; flex-direction: column; gap: 10px; transition: background 0.2s;
    }
    .sentence-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; }
    .sentence-input { width: 100%; padding: 6px; border: 2px solid var(--black); border-radius: 6px; font-size: 14px; outline: none; margin: 0; }

    /* Inputs */
    textarea, input[type="text"] { width: 100%; border: 2px solid var(--black); border-radius: 12px; padding: 10px; font-size: 16px; outline: none; background: var(--white); margin-top: 10px;}
    textarea { resize: vertical; min-height: 120px; line-height: 1.5; }
    
    /* Game Area */
    .cat-prompt { display: flex; align-items: flex-end; gap: 15px; margin-bottom: 20px; position: relative; }
    .cat-avatar { width: 80px; height: 80px; flex-shrink: 0;}
    .speech-bubble { background: var(--white); border: 2px solid var(--black); border-radius: 16px; border-bottom-left-radius: 0; padding: 12px; font-weight: bold; position: relative; flex: 1; box-shadow: 2px 2px 0 var(--black); }
    
    .drop-zone { min-height: 80px; background: #f0f0f0; border: 2px dashed #bdc3c7; border-radius: 12px; padding: 10px; display: flex; flex-wrap: wrap; gap: 10px; align-items: flex-start; margin-bottom: 10px; transition: background 0.3s;}
    .drop-zone.active-drag { background: var(--light-yellow); border-color: var(--black); }
    
    .play-translation { text-align: center; font-size: 16px; font-weight: bold; color: #8E44AD; margin-bottom: 10px; }
    .play-grammar { background: var(--light-yellow); border: 2px dashed #E67E22; padding: 12px; border-radius: 10px; margin-bottom: 10px; font-size: 14px; line-height: 1.5; color: #D35400;}
    
    .word-pool { display: flex; flex-wrap: wrap; gap: 10px; min-height: 80px; padding: 10px 0; }
    
    /* Word Blocks */
    .word-block { background: var(--light-blue); border: 2px solid var(--black); border-radius: 10px; padding: 8px 14px; font-size: 18px; font-weight: bold; cursor: pointer; user-select: none; box-shadow: 0 3px 0 var(--black); transition: transform 0.1s, background-color 0.3s; position: relative; color: var(--black); }
    .word-block:active { transform: translateY(3px); box-shadow: 0 0 0 var(--black); }
    .word-block.dragging { opacity: 0.5; }
    .word-block.locked { pointer-events: none; opacity: 0.9; }
    
    /* Status Colors for Blocks */
    .word-block.correct { background: var(--light-green) !important; color: var(--black); }
    .word-block.wrong { background: var(--light-red) !important; color: var(--black); animation: shake 0.4s; }
    
    /* Ruby (Jyutping) styles */
    ruby { ruby-align: center; }
    rt { font-size: 0.6em; color: #555; font-weight: normal; margin-bottom: -2px;}

    @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }

    /* Progress Bar */
    .progress-bar-container { width: 100%; background: #e0e0e0; border-radius: 10px; height: 12px; margin-bottom: 20px; border: 2px solid var(--black); overflow: hidden;}
    .progress-bar { height: 100%; background: var(--light-green); width: 0%; transition: width 0.3s ease; }

    /* Nav bar bottom */
    .bottom-nav { display: flex; justify-content: space-around; margin-top: 20px; }
</style>
</head>
<body>

<div class="container">
    <header>
        <div class="title-area">
            <svg class="cat-avatar" style="width:36px;height:36px" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                <circle cx="50" cy="50" r="45" fill="var(--light-yellow)" stroke="var(--black)" stroke-width="4"/>
                <path d="M25 45 L35 20 L50 35 L65 20 L75 45" fill="var(--light-yellow)" stroke="var(--black)" stroke-width="4" stroke-linejoin="round"/>
                <circle cx="35" cy="55" r="4" fill="var(--black)"/>
                <circle cx="65" cy="55" r="4" fill="var(--black)"/>
                <path d="M45 65 Q50 70 55 65" stroke="var(--black)" stroke-width="3" stroke-linecap="round" fill="none"/>
            </svg>
            <h1>喵喵语记</h1>
        </div>
        <div class="streak-area">
            <svg class="flame-icon flame-inactive" id="global-streak-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 2C12 2 7 7.5 7 13C7 15.7614 9.23858 18 12 18C14.7614 18 17 15.7614 17 13C17 7.5 12 2 12 2ZM12 22C8.68629 22 6 19.3137 6 16C6 11.5 12 4 12 4C12 4 18 11.5 18 16C18 19.3137 15.3137 22 12 22Z"/>
                <path d="M12 16C10.8954 16 10 15.1046 10 14C10 12.8954 12 10 12 10C12 10 14 12.8954 14 14C14 15.1046 13.1046 16 12 16Z" fill="#FFF"/>
            </svg>
            <span id="global-streak-text" style="font-size: 14px;">全局最高: 0 天</span>
        </div>
    </header>

    <div id="view-home" class="view-section">
        <h2>你的记忆小窝 (语集)</h2>
        <ul class="collection-list" id="collection-list"></ul>
        <div style="margin-top: 15px; text-align: center;">
            <button class="btn btn-blue" onclick="showCreateCollection()">+ 建立新的小窝</button>
        </div>
        <div class="bottom-nav">
            <button class="btn" onclick="showMistakes()">🐾 偶尔迷路的句子 (备忘录)</button>
        </div>
    </div>

    <div id="view-edit" class="view-section hidden">
        <button class="btn btn-small" style="margin-bottom: 10px;" onclick="navTo('view-home')">🔙 返回</button>
        <h2 id="edit-title">装扮新语集</h2>
        <input type="text" id="col-name" placeholder="给记忆小窝起个温暖的名字，比如：治愈系日语">
        <input type="text" id="col-icon" placeholder="输入Emoji图标" style="width: 130px; margin-top:10px;">
        
        <h3 style="margin-top: 20px;">放入新的句子 (三行一组)</h3>
        <p style="font-size: 14px; font-weight: bold; color: var(--black); margin-top: 5px;">小窝里已有记忆：<span id="col-count" style="color:var(--flame-on);">0</span> 句</p>
        <p style="font-size: 12px; color: #666; margin-top: 5px; line-height: 1.4;">
            * 请按3行一组放入，中间不要留空行哦：<br>
            第1行：原文<br>第2行：翻译<br>第3行：语法分析
        </p>
        <textarea id="col-sentences" placeholder="我是一只猫&#10;I am a cat.&#10;主语+系动词+表语&#10;她喜欢苹果&#10;She likes apples.&#10;一般现在时..."></textarea>
        
        <div style="margin-top: 15px; display: flex; gap: 10px;">
            <button class="btn btn-green" onclick="saveCollection()">💾 轻轻放进小窝</button>
        </div>

        <h3 style="margin-top: 25px; border-top: 2px dashed var(--black); padding-top: 15px;">已珍藏的句子 (点击修改或轻轻放下)</h3>
        <div id="existing-sentences-list" style="margin-top: 10px;"></div>
    </div>

    <div id="view-play" class="view-section hidden">
        <div class="progress-bar-container">
            <div class="progress-bar" id="play-progress"></div>
        </div>
        
        <div class="cat-prompt">
            <svg class="cat-avatar" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                <circle cx="50" cy="50" r="45" fill="var(--light-blue)" stroke="var(--black)" stroke-width="4"/>
                <path d="M25 45 L35 20 L50 35 L65 20 L75 45" fill="var(--light-blue)" stroke="var(--black)" stroke-width="4" stroke-linejoin="round"/>
                <circle cx="35" cy="55" r="5" fill="var(--black)"/>
                <circle cx="65" cy="55" r="5" fill="var(--black)"/>
                <path d="M45 70 Q50 75 55 70" stroke="var(--black)" stroke-width="3" stroke-linecap="round" fill="none"/>
            </svg>
            <div class="speech-bubble" id="play-prompt">将散落的记忆碎片拼凑起来吧！</div>
        </div>

        <div class="drop-zone" id="answer-zone"></div>
        <div class="play-translation" id="play-translation"></div>
        <div class="play-grammar hidden" id="play-grammar"></div>
        <div class="word-pool" id="word-pool"></div>

        <div style="margin-top: 20px; display: flex; justify-content: space-between;">
            <button class="btn" onclick="navTo('view-home')">🍃 歇息一下</button>
            <div style="display: flex; gap: 10px;">
                <button class="btn btn-blue" id="btn-skip" onclick="skipAnswer()">⏭️ 先跳过这句</button>
                <button class="btn btn-green" id="btn-check" onclick="checkAnswer()" disabled>🐾 轻轻确认</button>
                <button class="btn btn-green hidden" id="btn-next" onclick="onNextClicked()">➡️ 下一句</button>
            </div>
        </div>
    </div>

    <div id="view-mistakes" class="view-section hidden">
        <button class="btn btn-small" style="margin-bottom: 10px;" onclick="navTo('view-home')">🔙 返回</button>
        <h2>🐾 猫猫的温柔备忘录</h2>
        <ul class="collection-list" id="mistake-list"></ul>
    </div>
</div>

<script>
    // --- Data Storage & State ---
    let collections = JSON.parse(localStorage.getItem('miao_data')) || {};
    let currentCollectionId = null;
    
    // Play state
    let playQueue = [];
    let currentCardIndex = 0;
    let currentChunks = []; 
    let currentAttempts = 0; 
    let targetCorrect = 5; // 对5题过关
    let currentCorrectCount = 0;
    let isAnswerRevealed = false; // 是否已经展示了答案和语法，等待点击下一句

    // Ebbinghaus intervals in days
    const SRS_INTERVALS = [0, 1, 2, 4, 7, 15, 30]; 

    function saveData() {
        localStorage.setItem('miao_data', JSON.stringify(collections));
        updateGlobalStreak();
    }

    // --- Utility: Segmentation & Parsing ---
    function parseToRubyText(text) {
        const regex = /([^\(\)]+)\(([^\)]+)\)/g;
        if (!regex.test(text)) return text;
        return text.replace(regex, "<ruby>$1<rt>$2</rt></ruby>");
    }

    function removeRubyForLength(text) {
        return text.replace(/<rt>.*?<\/rt>/g, '').replace(/<ruby>|<\/ruby>/g, '');
    }

    function segmentSentence(sentence) {
        if (sentence.includes('、')) {
            return sentence.split('、').filter(s => s.trim().length > 0).map(parseToRubyText);
        }
        let words = [];
        try {
            const segmenter = new Intl.Segmenter(undefined, { granularity: 'word' });
            words = Array.from(segmenter.segment(sentence)).map(s => s.segment).filter(s => s.trim().length > 0);
        } catch(e) {
            words = sentence.match(/[\u4e00-\u9fa5]|[\w']+|[^\s\w\u4e00-\u9fa5]+/g) || [sentence];
        }

        while (words.length > 7) {
            let minLen = Infinity;
            let minIdx = 0;
            for(let i=0; i<words.length-1; i++) {
                let len = removeRubyForLength(words[i]).length + removeRubyForLength(words[i+1]).length;
                if(len < minLen) {
                    minLen = len;
                    minIdx = i;
                }
            }
            words[minIdx] = words[minIdx] + words[minIdx+1];
            words.splice(minIdx+1, 1);
        }
        
        if (words.length === 1 && words[0].length > 1) {
            let half = Math.ceil(words[0].length / 2);
            words = [words[0].slice(0, half), words[0].slice(half)];
        }
        return words.map(parseToRubyText);
    }

    function shuffleArray(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    // --- View Navigation ---
    function navTo(viewId) {
        document.querySelectorAll('.view-section').forEach(el => el.classList.add('hidden'));
        document.getElementById(viewId).classList.remove('hidden');
        if(viewId === 'view-home') renderHome();
    }

    // --- Home & Streak ---
    function updateGlobalStreak() {
        let maxGlobalStreak = 0;
        const today = new Date().toDateString();
        const yesterday = new Date(Date.now() - 86400000).toDateString();
        let isAnyStreakActiveToday = false;

        Object.values(collections).forEach(col => {
            let activeStreak = col.streakCount || 0;
            if (col.lastPlayDate !== today && col.lastPlayDate !== yesterday) activeStreak = 0; 
            if (col.lastPlayDate === today) isAnyStreakActiveToday = true;
            maxGlobalStreak = Math.max(maxGlobalStreak, activeStreak); 
        });

        const icon = document.getElementById('global-streak-icon');
        const text = document.getElementById('global-streak-text');
        
        if (isAnyStreakActiveToday) {
            icon.classList.remove('flame-inactive'); icon.classList.add('flame-active');
            text.style.color = "var(--flame-on)";
        } else {
            icon.classList.remove('flame-active'); icon.classList.add('flame-inactive');
            text.style.color = "var(--flame-off)";
        }
        text.innerText = `全局最高: ${maxGlobalStreak} 天`;
    }

    function renderHome() {
        const list = document.getElementById('collection-list');
        list.innerHTML = '';
        const cols = Object.values(collections);
        const today = new Date().toDateString();
        const yesterday = new Date(Date.now() - 86400000).toDateString();
        
        if(cols.length === 0) {
            list.innerHTML = '<p style="text-align:center; color:#7F8C8D; padding:20px;">还没有建立任何记忆小窝哦，快点击下方按钮吧！</p>';
        } else {
            cols.forEach(col => {
                const li = document.createElement('li');
                li.className = 'collection-item';
                const dueCount = col.cards.filter(c => c.nextReview <= Date.now() || c.level === 0).length;
                
                let isToday = (col.lastPlayDate === today);
                let displayStreak = col.streakCount || 0;
                if (col.lastPlayDate !== today && col.lastPlayDate !== yesterday) displayStreak = 0;
                
                const flameClass = isToday ? 'flame-active' : 'flame-inactive';
                const textColor = isToday ? 'var(--flame-on)' : 'var(--flame-off)';

                li.innerHTML = `
                    <div class="collection-info" onclick="editCollection('${col.id}')" style="flex:1; overflow:hidden;">
                        <span style="font-size:24px;">${col.icon || '📦'}</span>
                        <div style="display:flex; flex-direction:column; overflow:hidden;">
                            <span style="white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${col.name}</span>
                            <span style="font-size:12px; font-weight:normal; color:#555; margin-top:3px;">共 ${col.cards.length} 句 | 需重温: ${dueCount}</span>
                        </div>
                    </div>
                    <div class="collection-right">
                        <div class="streak-area" style="font-size: 14px; margin-left: 10px;">
                            <svg class="flame-icon ${flameClass}" style="width:20px;height:20px;" viewBox="0 0 24 24">
                                <path d="M12 2C12 2 7 7.5 7 13C7 15.7614 9.23858 18 12 18C14.7614 18 17 15.7614 17 13C17 7.5 12 2 12 2ZM12 22C8.68629 22 6 19.3137 6 16C6 11.5 12 4 12 4C12 4 18 11.5 18 16C18 19.3137 15.3137 22 12 22Z"/>
                                <path d="M12 16C10.8954 16 10 15.1046 10 14C10 12.8954 12 10 12 10C12 10 14 12.8954 14 14C14 15.1046 13.1046 16 12 16Z" fill="#FFF"/>
                            </svg>
                            <span style="color: ${textColor}">${displayStreak} 天</span>
                        </div>
                        <button class="btn-quick-play" onclick="quickStartPlay(event, '${col.id}')">
                            <svg width="20" height="20" viewBox="0 0 100 100"><circle cx="50" cy="50" r="45" fill="#fff" stroke="var(--black)" stroke-width="4"/><path d="M25 45 L35 20 L50 35 L65 20 L75 45" fill="#fff" stroke="var(--black)" stroke-width="4" stroke-linejoin="round"/><circle cx="35" cy="55" r="4" fill="var(--black)"/><circle cx="65" cy="55" r="4" fill="var(--black)"/><path d="M45 65 Q50 70 55 65" stroke="var(--black)" stroke-width="3" stroke-linecap="round" fill="none"/></svg>
                            去陪伴
                        </button>
                    </div>
                `;
                list.appendChild(li);
            });
        }
        updateGlobalStreak();
    }

    // --- Collection Management ---
    function showCreateCollection() {
        currentCollectionId = Date.now().toString();
        document.getElementById('edit-title').innerText = "装扮新小窝";
        document.getElementById('col-name').value = ''; document.getElementById('col-icon').value = '🐈';
        document.getElementById('col-sentences').value = ''; document.getElementById('col-count').innerText = "0";
        document.getElementById('existing-sentences-list').innerHTML = '<p style="font-size: 14px; color: #666;">小窝里暂时空空的，先写下几句心里话吧~</p>';
        navTo('view-edit');
    }

    function editCollection(id) {
        currentCollectionId = id;
        const col = collections[id];
        document.getElementById('edit-title').innerText = "管理与填充小窝";
        document.getElementById('col-name').value = col.name; document.getElementById('col-icon').value = col.icon;
        document.getElementById('col-sentences').value = ''; document.getElementById('col-count').innerText = col.cards.length; 
        renderExistingSentences();
        navTo('view-edit');
    }

    function renderExistingSentences() {
        const list = document.getElementById('existing-sentences-list');
        list.innerHTML = '';
        const col = collections[currentCollectionId];
        
        if(!col || !col.cards || col.cards.length === 0) {
            list.innerHTML = '<p style="font-size: 14px; color: #666;">小窝里暂时空空的，先写下几句心里话吧~</p>';
            return;
        }

        col.cards.forEach(card => {
            const div = document.createElement('div');
            div.className = 'sentence-item';

            const header = document.createElement('div');
            header.className = 'sentence-header';

            const textBlock = document.createElement('div');
            textBlock.style.flex = "1";
            textBlock.innerHTML = `<span style="font-size:16px; font-weight:bold; color:var(--black);">${card.text}</span> <span style="font-size:14px; color:#555;">(${card.translation || ''})</span>`;
            
            const gramBtn = document.createElement('button');
            gramBtn.className = 'btn btn-small btn-blue';
            gramBtn.innerText = '📖 语法';
            
            const btnGroup = document.createElement('div');
            btnGroup.style.display = 'flex'; btnGroup.style.gap = '5px';
            const editBtn = document.createElement('button'); editBtn.className = 'btn btn-small btn-blue'; editBtn.innerText = '✏️ 修改';
            const delBtn = document.createElement('button'); delBtn.className = 'btn btn-small'; delBtn.innerText = '🗑️';

            textBlock.appendChild(gramBtn);
            btnGroup.appendChild(editBtn); btnGroup.appendChild(delBtn);
            header.appendChild(textBlock); header.appendChild(btnGroup);

            const gramDiv = document.createElement('div');
            gramDiv.className = 'hidden';
            gramDiv.style.fontSize = '13px'; gramDiv.style.color = '#E67E22'; gramDiv.style.background = '#FFFDE7'; gramDiv.style.padding = '8px'; gramDiv.style.borderRadius = '6px';
            gramDiv.innerHTML = `<strong>语法分析：</strong>${card.grammar || '无'}`;
            
            gramBtn.onclick = () => gramDiv.classList.toggle('hidden');

            const editContainer = document.createElement('div');
            editContainer.style.display = 'none'; editContainer.style.flexDirection = 'column'; editContainer.style.gap = '8px';

            const inputT = document.createElement('input'); inputT.className = 'sentence-input'; inputT.value = card.text; inputT.placeholder = "原文";
            const inputTr = document.createElement('input'); inputTr.className = 'sentence-input'; inputTr.value = card.translation || ''; inputTr.placeholder = "翻译";
            const inputG = document.createElement('input'); inputG.className = 'sentence-input'; inputG.value = card.grammar || ''; inputG.placeholder = "语法";

            const actionRow = document.createElement('div');
            actionRow.style.display = 'flex'; actionRow.style.gap = '10px';
            const saveBtn = document.createElement('button'); saveBtn.className = 'btn btn-small btn-green'; saveBtn.innerText = '💾 保存';
            const cancelBtn = document.createElement('button'); cancelBtn.className = 'btn btn-small'; cancelBtn.innerText = '取消';
            actionRow.appendChild(saveBtn); actionRow.appendChild(cancelBtn);

            editContainer.append(inputT, inputTr, inputG, actionRow);

            editBtn.onclick = () => { header.style.display = 'none'; gramDiv.style.display = 'none'; editContainer.style.display = 'flex'; };
            cancelBtn.onclick = () => { header.style.display = 'flex'; editContainer.style.display = 'none'; };

            saveBtn.onclick = () => {
                if (inputT.value.trim() !== '') {
                    card.text = inputT.value.trim();
                    card.translation = inputTr.value.trim();
                    card.grammar = inputG.value.trim();
                    card.chunks = segmentSentence(card.text); 
                    saveData();
                }
                renderExistingSentences();
            };

            delBtn.onclick = () => {
                if(confirm('确定要让这句话随风飘散吗？')) {
                    col.cards = col.cards.filter(c => c.id !== card.id);
                    document.getElementById('col-count').innerText = col.cards.length;
                    saveData(); renderExistingSentences();
                }
            };

            div.append(header, gramDiv, editContainer);
            list.appendChild(div);
        });
    }

    function saveCollection() {
        const name = document.getElementById('col-name').value || '未命名小窝';
        const icon = document.getElementById('col-icon').value || '🐈';
        const text = document.getElementById('col-sentences').value;
        
        const lines = text.split('\n').map(l => l.trim()).filter(l => l.length > 0);
        
        if (lines.length > 0 && lines.length % 3 !== 0) {
            alert("喵~ 放入句子的格式好像有一点点偏离哦！请确保【原文】、【翻译】、【语法】各占一行，总行数是3的倍数。再检查一下吧~");
            return;
        }
        
        const existingCol = collections[currentCollectionId];
        const existingCards = existingCol ? existingCol.cards : [];
        let newCards = [];

        for(let i=0; i<lines.length; i+=3) {
            let orig = lines[i];
            let trans = lines[i+1];
            let gram = lines[i+2];
            
            if (!existingCards.find(c => c.text === orig)) {
                newCards.push({
                    id: Date.now().toString() + "_" + i,
                    text: orig,
                    translation: trans,
                    grammar: gram,
                    chunks: segmentSentence(orig),
                    level: 0,
                    nextReview: Date.now(),
                    mistakes: 0
                });
            }
        }

        const updatedCards = [...existingCards, ...newCards];

        collections[currentCollectionId] = {
            id: currentCollectionId,
            name: name,
            icon: icon,
            streakCount: existingCol ? existingCol.streakCount : 0,
            lastPlayDate: existingCol ? existingCol.lastPlayDate : null,
            cards: updatedCards
        };
        
        saveData();
        navTo('view-home');
    }

    // --- SRS & Play Logic ---
    function quickStartPlay(event, colId) {
        event.stopPropagation();
        currentCollectionId = colId;
        startPlaySession();
    }

    function startPlaySession() {
        const col = collections[currentCollectionId];
        if (!col || col.cards.length === 0) {
            alert("这个小窝里还没有放入任何句子哦，先去添加一点温暖的记忆吧！");
            return;
        }

        let dueCards = col.cards.filter(c => c.nextReview <= Date.now() || c.level === 0)
                               .sort((a, b) => b.mistakes - a.mistakes || a.nextReview - b.nextReview);
        
        playQueue = dueCards;
        // 保证队列里至少有足够的卡片来玩
        while(playQueue.length < 15 && col.cards.length > 0) {
            let extra = [...col.cards].sort(() => 0.5 - Math.random());
            playQueue = playQueue.concat(extra);
        }

        currentCardIndex = 0;
        currentCorrectCount = 0;
        document.getElementById('play-progress').style.width = '0%';
        navTo('view-play');
        loadNextCard();
    }

    function loadNextCard() {
        if (currentCorrectCount >= targetCorrect) {
            finishSession();
            return;
        }
        if (currentCardIndex >= playQueue.length) {
            const col = collections[currentCollectionId];
            playQueue = playQueue.concat([...col.cards].sort(()=>0.5-Math.random()));
        }

        isAnswerRevealed = false;
        currentAttempts = 0;
        const card = playQueue[currentCardIndex];
        
        document.getElementById('play-translation').innerText = card.translation || '';
        const gramBox = document.getElementById('play-grammar');
        gramBox.classList.add('hidden');
        gramBox.innerHTML = `<strong>语法分析：</strong><br>${card.grammar || '无'}`;

        document.getElementById('play-prompt').innerHTML = `将散落的记忆碎片拼凑起来吧！`;
        
        document.getElementById('btn-skip').classList.remove('hidden');
        document.getElementById('btn-check').classList.remove('hidden');
        document.getElementById('btn-next').classList.add('hidden');
        
        document.getElementById('answer-zone').innerHTML = '';
        const pool = document.getElementById('word-pool');
        pool.innerHTML = '';
        
        let originalChunks = card.chunks.map((html, idx) => ({ id: `c_${idx}`, html: html, originalIdx: idx }));
        currentChunks = shuffleArray([...originalChunks]);
        
        currentChunks.forEach(chunk => pool.appendChild(createWordBlock(chunk)));
        checkSubmitState();
    }

    // --- Drag & Drop & Click Interaction ---
    let draggedElement = null;

    function createWordBlock(chunk) {
        const div = document.createElement('div');
        div.className = 'word-block';
        div.innerHTML = chunk.html;
        div.dataset.id = chunk.id;
        div.dataset.oid = chunk.originalIdx;
        div.draggable = true;

        div.addEventListener('click', (e) => {
            if(isAnswerRevealed) return;
            const parentId = div.parentElement.id;
            if (parentId === 'word-pool') {
                document.getElementById('answer-zone').appendChild(div);
            } else {
                document.getElementById('word-pool').appendChild(div);
                div.classList.remove('wrong');
            }
            checkSubmitState();
        });

        div.addEventListener('dragstart', (e) => {
            if(isAnswerRevealed) return;
            draggedElement = div;
            setTimeout(() => div.classList.add('dragging'), 0);
            document.getElementById('answer-zone').classList.add('active-drag');
        });

        div.addEventListener('dragend', () => {
            if(isAnswerRevealed) return;
            if(draggedElement) draggedElement.classList.remove('dragging');
            draggedElement = null;
            document.getElementById('answer-zone').classList.remove('active-drag');
            checkSubmitState();
        });

        return div;
    }

    const answerZone = document.getElementById('answer-zone');
    answerZone.addEventListener('dragover', e => {
        if(isAnswerRevealed) return;
        e.preventDefault();
        const afterElement = getDragAfterElement(answerZone, e.clientX, e.clientY);
        if (afterElement == null) {
            answerZone.appendChild(draggedElement);
        } else {
            answerZone.insertBefore(draggedElement, afterElement);
        }
    });

    const poolZone = document.getElementById('word-pool');
    poolZone.addEventListener('dragover', e => {
        if(isAnswerRevealed) return;
        e.preventDefault();
        poolZone.appendChild(draggedElement);
    });

    function getDragAfterElement(container, x, y) {
        const draggableElements = [...container.querySelectorAll('.word-block:not(.dragging)')];
        return draggableElements.reduce((closest, child) => {
            const box = child.getBoundingClientRect();
            const offsetX = x - box.left - box.width / 2;
            const offsetY = y - box.top - box.height / 2;
            
            if (offsetY < box.height && offsetY > -box.height) {
                 if (offsetX < 0 && offsetX > closest.offset) return { offset: offsetX, element: child };
            }
            return closest;
        }, { offset: Number.NEGATIVE_INFINITY }).element;
    }

    function checkSubmitState() {
        if(isAnswerRevealed) return;
        const poolEmpty = document.getElementById('word-pool').children.length === 0;
        document.getElementById('btn-check').disabled = !poolEmpty;
        
        const blocks = document.getElementById('answer-zone').children;
        for(let b of blocks) b.classList.remove('wrong', 'correct');
        document.getElementById('play-prompt').innerHTML = `拼好啦？猫猫正用温柔的目光注视着你哦~`;
    }

    function showGrammarAndNext() {
        isAnswerRevealed = true;
        document.getElementById('play-grammar').classList.remove('hidden');
        document.getElementById('btn-skip').classList.add('hidden');
        document.getElementById('btn-check').classList.add('hidden');
        document.getElementById('btn-next').classList.remove('hidden');
        
        // 锁定所有的词块
        const allBlocks = document.querySelectorAll('.word-block');
        allBlocks.forEach(b => {
            b.draggable = false;
            b.classList.add('locked');
        });
    }

    function autoAssemble() {
        const blocks = [...document.getElementById('answer-zone').children, ...document.getElementById('word-pool').children];
        blocks.sort((a, b) => parseInt(a.dataset.oid) - parseInt(b.dataset.oid));
        const ansZone = document.getElementById('answer-zone');
        ansZone.innerHTML = '';
        document.getElementById('word-pool').innerHTML = '';
        blocks.forEach(b => {
            ansZone.appendChild(b);
            b.classList.add('correct');
            b.classList.remove('wrong');
        });
    }

    function checkAnswer() {
        if(isAnswerRevealed) return;
        const blocks = [...document.getElementById('answer-zone').children];
        const currentCard = playQueue[currentCardIndex];
        
        let allCorrect = true;
        blocks.forEach((block, idx) => {
            if (parseInt(block.dataset.oid) === idx) {
                block.classList.add('correct'); block.classList.remove('wrong');
            } else {
                block.classList.add('wrong'); block.classList.remove('correct');
                allCorrect = false;
            }
        });

        if (allCorrect) {
            currentCorrectCount++;
            document.getElementById('play-progress').style.width = `${(currentCorrectCount / targetCorrect) * 100}%`;
            document.getElementById('play-prompt').innerHTML = `完全正确！猫猫开心地蹭了蹭你 🐾 (温暖进度: ${currentCorrectCount}/${targetCorrect})`;
            
            if(currentAttempts === 0) currentCard.level = Math.min(currentCard.level + 1, SRS_INTERVALS.length - 1);
            currentCard.nextReview = Date.now() + SRS_INTERVALS[currentCard.level] * 24 * 60 * 60 * 1000;
            
            showGrammarAndNext();
        } else {
            currentAttempts++;
            currentCard.mistakes++;
            currentCard.level = Math.max(0, currentCard.level - 1);
            currentCard.nextReview = Date.now() + 10 * 60 * 1000; 

            if (currentAttempts >= 3) {
                document.getElementById('play-prompt').innerHTML = `没关系，稍微休息一下。猫猫悄悄把原本的样子和语法叼来啦！`;
                autoAssemble();
                showGrammarAndNext();
            } else {
                document.getElementById('play-prompt').innerHTML = `哎呀，好像有一点点偏差呢。别着急，再试一次吧？(第 ${currentAttempts}/3 次尝试)`;
            }
        }
        saveData();
    }

    function skipAnswer() {
        if(isAnswerRevealed) return;
        const currentCard = playQueue[currentCardIndex];
        currentCard.mistakes++; // 算作错题加深记忆
        currentCard.level = Math.max(0, currentCard.level - 1);
        currentCard.nextReview = Date.now() + 10 * 60 * 1000;
        saveData();

        document.getElementById('play-prompt').innerHTML = `没关系，先跳过这句。我们一起来看看它原本的样子和语法吧~`;
        autoAssemble();
        showGrammarAndNext();
    }

    function onNextClicked() {
        currentCardIndex++;
        loadNextCard();
    }

    function finishSession() {
        const col = collections[currentCollectionId];
        const today = new Date().toDateString();
        const yesterday = new Date(Date.now() - 86400000).toDateString();
        
        if (col.lastPlayDate !== today) {
            if (col.lastPlayDate === yesterday) col.streakCount = (col.streakCount || 0) + 1;
            else col.streakCount = 1; 
            col.lastPlayDate = today;
        }
        
        saveData();
        document.getElementById('play-prompt').innerHTML = `太棒啦！今日份的相伴目标（找回 ${targetCorrect} 句）已达成，成功点燃了温暖的火花！😽🔥`;
        document.getElementById('answer-zone').innerHTML = '';
        document.getElementById('word-pool').innerHTML = '';
        document.getElementById('play-translation').innerText = '';
        document.getElementById('play-grammar').classList.add('hidden');
        document.getElementById('btn-skip').classList.add('hidden');
        document.getElementById('btn-check').classList.add('hidden');
        document.getElementById('btn-next').classList.add('hidden');
        
        setTimeout(() => navTo('view-home'), 2500);
    }

    // --- Mistake Book ---
    function showMistakes() {
        const list = document.getElementById('mistake-list');
        list.innerHTML = '';
        
        let allMistakes = [];
        Object.values(collections).forEach(col => {
            col.cards.forEach(card => {
                if (card.mistakes > 0) allMistakes.push({ colName: col.name, card: card });
            });
        });

        allMistakes.sort((a, b) => b.card.mistakes - a.card.mistakes);

        if (allMistakes.length === 0) {
            list.innerHTML = '<p style="text-align:center; color:#7F8C8D; padding:20px;">小猫轻轻蹭了蹭你，这里目前没有任何迷路的句子，你做得很棒！</p>';
        } else {
            allMistakes.forEach(item => {
                const li = document.createElement('li');
                li.className = 'collection-item';
                li.style.cursor = 'default';
                li.style.transform = 'none';
                
                li.innerHTML = `
                    <div style="display:flex; flex-direction:column; gap:5px;">
                        <span style="font-size: 14px; color: #666;">来源: ${item.colName}</span>
                        <span style="font-weight: bold; font-size: 16px;">${item.card.text}</span>
                        <span style="font-size: 14px; color: #555;">(${item.card.translation || '暂无翻译'})</span>
                    </div>
                    <div style="background: var(--light-red); padding: 5px 10px; border-radius: 8px; border: 1px solid var(--black); font-size: 14px; text-align: center;">
                        偶尔迷路<br>${item.card.mistakes} 次
                    </div>
                `;
                list.appendChild(li);
            });
        }
        navTo('view-mistakes');
    }

    // --- Initialization ---
    window.onload = () => renderHome();

</script>
</body>
